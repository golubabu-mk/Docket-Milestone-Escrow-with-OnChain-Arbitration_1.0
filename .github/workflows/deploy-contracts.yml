name: Deploy Contracts to Testnet

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/stellar
            target
          key: ${{ runner.os }}-cargo-stellar-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stellar-

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Stellar CLI
        run: |
          if ! command -v stellar &> /dev/null; then
            cargo install --locked stellar-cli
          else
            echo "Stellar CLI already installed from cache"
          fi

      - name: Build Contracts
        run: bash scripts/build.sh

      - name: Setup testnet identity
        run: stellar keys generate deployer --network testnet --fund

      - name: Deploy to Testnet
        id: deploy
        run: |
          # Capture the output of the deploy script
          OUTPUT=$(bash scripts/deploy_testnet.sh)
          echo "$OUTPUT"
          
          # Extract Contract IDs to display in Github Actions Summary
          REGISTRY_ID=$(echo "$OUTPUT" | grep "ContributorRegistry:" | awk '{print $2}')
          BOARD_ID=$(echo "$OUTPUT" | grep "BountyBoard:" | awk '{print $2}')
          
          echo "### Deployed Contract IDs 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- **Bounty Board Contract ID** (\`NEXT_PUBLIC_BOUNTY_BOARD_CONTRACT_ID\`): \`$BOARD_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Contributor Registry Contract ID** (\`NEXT_PUBLIC_CONTRIBUTOR_REGISTRY_CONTRACT_ID\`): \`$REGISTRY_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "Set these in your Vercel Environment Variables to fix the frontend loading error!" >> $GITHUB_STEP_SUMMARY
